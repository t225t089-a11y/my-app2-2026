<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal Match</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Crystal Match</h1>
            <div class="stats">
                <div class="stat-box">
                    <span>Score</span>
                    <div id="score">0</div>
                </div>
                <div class="stat-box">
                    <span>Best</span>
                    <div id="best">0</div>
                </div>
            </div>
        </header>

        <div id="game-board" class="game-board"></div>

        <div class="controls">
            <button id="reset-btn">New Game</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
